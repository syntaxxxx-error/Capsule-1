<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cosmic Time Capsule ⌛</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-blue: #00ffff;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #020205;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1a3a 0%, #020205 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .capsule-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid var(--neon-purple);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 40px rgba(188, 19, 254, 0.3);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--neon-blue);
            background: rgba(0,0,0,0.5);
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .add-btn {
            padding: 0 20px;
            background: var(--neon-purple);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .add-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon-purple); }

        #goalList {
            list-style: none;
            padding: 0;
            margin-bottom: 30px;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
        }

        .goal-item {
            background: rgba(255,255,255,0.05);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--neon-blue);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .remove-btn {
            color: #ff4d4d;
            cursor: pointer;
            font-weight: bold;
            background: none;
            border: none;
            font-size: 1.2rem;
        }

        .seal-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue));
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-purple);
            transition: 0.3s;
        }

        .seal-btn:hover { transform: translateY(-5px); box-shadow: 0 0 30px var(--neon-blue); }
    </style>
</head>
<body>

    <div class="space-bg" id="stars"></div>

    <div class="capsule-container">
        <h1>The Cosmic Time Capsule ⌛</h1>
        <p>Write your goals for the future. Seal them, and hold them safe until they all come true.</p>

        <div class="input-group">
            <input type="text" id="goalInput" placeholder="Example: Travel to Japan... ✈️">
            <button class="add-btn" onclick="addGoal()">Add ✨</button>
        </div>

        <ul id="goalList"></ul>

        <form id="capsuleForm" action="https://formspree.io/f/mojpygjz" method="POST">
            <!-- REDIRECTS BACK TO THE HOME PAGE -->
            <input type="hidden" name="_next" value="index.html">
            <input type="hidden" name="Future_Goals" id="hiddenGoals">
            <button type="submit" class="seal-btn">Seal the Capsule 🔒</button>
        </form>
    </div>

    <script>
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                container.appendChild(star);
            }
        }

        let goals = [];

        function addGoal() {
            const input = document.getElementById('goalInput');
            const goalText = input.value.trim();
            if (goalText === "") return;
            goals.push(goalText);
            input.value = "";
            renderGoals();
        }

        function removeGoal(index) {
            goals.splice(index, 1);
            renderGoals();
        }

        function renderGoals() {
            const list = document.getElementById('goalList');
            list.innerHTML = "";
            goals.forEach((goal, index) => {
                const li = document.createElement('li');
                li.className = 'goal-item';
                li.innerHTML = `<span>${goal}</span><button class="remove-btn" onclick="removeGoal(${index})">×</button>`;
                list.appendChild(li);
            });
        }

        document.getElementById('capsuleForm').onsubmit = function() {
            if (goals.length === 0) {
                alert("Add at least one goal before sealing the capsule! 😺");
                return false;
            }
            // SAVE TO LOCALSTORAGE FOR THE HOME PAGE TO READ
            localStorage.setItem('sanjuGoals', JSON.stringify(goals));
            
            document.getElementById('hiddenGoals').value = goals.join(", ");
            return true;
        };

        createStars();
    </script>
</body>
</html>
